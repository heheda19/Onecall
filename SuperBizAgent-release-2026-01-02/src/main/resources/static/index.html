<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能OnCall助手 | SuperBizAgent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/es/highlight.min.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor"/>
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
            </div>
            <h2 class="sidebar-title">OnCall 助手</h2>
        </div>

        <div class="sidebar-content">
            <button class="new-chat-btn" id="newChatBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>开启新对话</span>
            </button>

            <div class="chat-history-section">
                <div class="history-header">
                    <span>近期对话</span>
                </div>
                <div class="chat-history-list" id="chatHistoryList">
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <button class="ai-ops-top-btn" id="aiOpsSidebarBtn">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
            <span>一键 AI Ops 排查</span>
        </button>
        <div class="chat-container">
            <div class="welcome-greeting" id="welcomeGreeting">
                <div class="welcome-icon">👋</div>
                <p>你好！我是智能 OnCall 助手</p>
                <span class="welcome-subtitle">支持日志检索、告警分析、知识库问答</span>
            </div>
            <div class="chat-messages" id="chatMessages">
            </div>

            <div class="chat-input-container">
                <div class="input-group-wrapper">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="描述你的问题或系统现象..." maxlength="1000" class="message-input">
                        <div class="input-bottom-bar">
                            <div class="tools-btn-wrapper">
                                <button class="tools-btn" id="toolsBtn" title="工具箱">
                                    <svg class="tools-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M12 4V20M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                    </svg>
                                </button>
                                <div class="tools-menu" id="toolsMenu">
                                    <div class="tools-menu-item" id="uploadFileItem">
                                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15M17 8L12 3M12 3L7 8M12 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                        <span>上传知识库文档</span>
                                    </div>
                                </div>
                            </div>
                            <div class="right-actions">
                                <div class="mode-selector-wrapper">
                                    <button class="mode-selector-btn" id="modeSelectorBtn">
                                        <span class="mode-dot"></span>
                                        <span id="currentModeText">快速</span>
                                        <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                            <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                    <div class="mode-dropdown" id="modeDropdown">
                                        <div class="dropdown-header">响应策略</div>
                                        <div class="dropdown-item active" data-mode="quick">
                                            <div class="dropdown-item-main">
                                                <span>快速 (聚合结果)</span>
                                            </div>
                                        </div>
                                        <div class="dropdown-item" data-mode="stream">
                                            <div class="dropdown-item-main">
                                                <span>流式 (过程可见)</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button class="send-btn-circle" id="sendButton" title="发送">
                                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <input type="file" id="fileInput" accept=".txt,.md,.markdown" style="display: none;">
            </div>
        </div>
    </main>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <div class="loading-text">智能运维分析中...</div>
        <div class="loading-subtext">正在调用工具检索底层日志与告警指标</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
